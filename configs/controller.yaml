server:
  http_addr: ":8080"
  grpc_addr: ":9090"
  # allowed_networks: CIDR allowlist; empty = allow all
  # allowed_networks:
  #   - "192.168.70.0/24"
  #   - "10.147.20.0/24"
  #   - "127.0.0.0/8"

storage:
  driver: sqlite
  sqlite:
    path: "./data/probex.db"

retention:
  raw_results: 720h    # 30 days
  aggregated: 8760h    # 1 year

agent:
  name: "local"
  labels:
    region: "local"

runner:
  max_concurrent: 50
