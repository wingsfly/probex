# ProbeX Standalone — single-node monitoring
services:
  probex:
    image: ${PROBEX_IMAGE:-ghcr.io/hjma/probex:latest}
    pull_policy: always
    ports:
      - "8080:8080"
    volumes:
      - probex-data:/data
    command: ["standalone", "--config", "/data/config.yaml"]
    restart: unless-stopped

volumes:
  probex-data:
